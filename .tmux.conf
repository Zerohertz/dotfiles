# NOTE:
# tmux kill-server
# tmux source-file ~/.tmux.conf
# tmux source ~/.tmux.conf


# ------------------------ General ------------------------ #
# Mouse support (scroll, select pane, drag to select text)
set -g mouse on

# Vi-style copy mode (enter with prefix+v)
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Scrollback buffer size increase
set -g history-limit 100000

# Allow OSC escape sequences to pass through tmux (for desktop notifications)
set -g allow-passthrough on

# Forward OSC 52 clipboard writes (e.g., nvim yank) to the host terminal
set -g set-clipboard on

# Forward focus events to programs (Claude Code focus tracking, vim autoread)
set -g focus-events on

# Disable window name auto change
set-option -g allow-rename off

# Auto renumber windows when one is closed
set -g renumber-windows on

# Status message display duration (ms)
set -g display-time 3000

# Remove ESC key delay (better vim responsiveness)
set -sg escape-time 0


# ------------------------ Theme ------------------------ #
# Accent: #800a0a on black
# Status bar base
set -g status-bg black
set -g status-fg white

# Window status (tabs in status bar)
set -g window-status-style "fg=brightblack,bg=default"
set -g window-status-current-style "fg=#800a0a,bold"
set -g window-status-activity-style "fg=#800a0a,bg=default"
set -g window-status-bell-style "fg=#800a0a,bg=default"

# Pane borders
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=#800a0a"

# Messages and command prompt
set -g message-style "bg=#800a0a,fg=white"
set -g message-command-style "bg=#800a0a,fg=white"

# Copy mode and selection
set -g mode-style "bg=#800a0a,fg=white"

# Clock mode (prefix + t)
set -g clock-mode-colour "#800a0a"

# Pane number display (prefix + q)
set -g display-panes-colour "white"
set -g display-panes-active-colour "#800a0a"

# Copy mode search highlight
set -g copy-mode-match-style "bg=#800a0a,fg=white"
set -g copy-mode-current-match-style "bg=white,fg=#800a0a"

# Popup and menu (tmux 3.3+)
set -g popup-style "bg=black"
set -g popup-border-style "fg=#800a0a"
set -g menu-style "bg=black,fg=white"
set -g menu-border-style "fg=#800a0a"
set -g menu-selected-style "bg=#800a0a,fg=white"


# ------------------------ Status Bar ------------------------ #
set -g status-position bottom
set -g status-justify right
set -g status-left-length 60
set -g status-right-length 0
set -g status-interval 5

# Left: session name + state indicators (<P,Z,C,S,M,D> or <N>)
set -g status-left "#[fg=#800a0a,bold]#S#[align=absolute-centre,fg=#800a0a]#{?#{||:#{client_prefix},#{||:#{window_zoomed_flag},#{||:#{pane_in_mode},#{||:#{pane_synchronized},#{||:#{window_marked_flag},#{pane_dead}}}}}},<#{?client_prefix,P,}#{?#{&&:#{window_zoomed_flag},#{client_prefix}},#,,}#{?window_zoomed_flag,Z,}#{?#{&&:#{pane_in_mode},#{||:#{client_prefix},#{window_zoomed_flag}}},#,,}#{?pane_in_mode,C,}#{?#{&&:#{pane_synchronized},#{||:#{client_prefix},#{||:#{window_zoomed_flag},#{pane_in_mode}}}},#,,}#{?pane_synchronized,S,}#{?#{&&:#{window_marked_flag},#{||:#{client_prefix},#{||:#{window_zoomed_flag},#{||:#{pane_in_mode},#{pane_synchronized}}}}},#,,}#{?window_marked_flag,M,}#{?#{&&:#{pane_dead},#{||:#{client_prefix},#{||:#{window_zoomed_flag},#{||:#{pane_in_mode},#{||:#{pane_synchronized},#{window_marked_flag}}}}}},#,,}#{?pane_dead,D,}>,<N>}"
set -g status-right ""


# ------------------------ Aliases ------------------------ #
# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Vi-style pane switching with prefix+hjkl
unbind l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Shift arrow to switch windows
bind -n S-Left previous-window
bind -n S-Right next-window

# Change window order
bind-key -n C-S-Left swap-window -t -1
bind-key -n C-S-Right swap-window -t +1

# Split window
bind | split-window -h
bind - split-window -v

# Sync
bind s setw synchronize-panes

# Rename window / session
bind r command-prompt -p "(rename-window)" -I "#W" "rename-window '%%'"
bind R command-prompt -p "(rename-session)" -I "#S" "rename-session '%%'"
